# ==========================================
# 站点基础配置
# ==========================================
title: 没有夜空的星星
subtitle: 记录代码与生活的一点点光
name: noskystar
description: "一个程序员的技术笔记与思考碎片"
url: "https://noskystar.github.io"
baseurl: ""

# ==========================================
# 作者信息（minima 主题专用格式）
# ==========================================
author:
  name: noskystar

# ==========================================
# 社交链接（minima 能识别的格式）
# ==========================================
github_username: noskystar

# ==========================================
# 主题配置
# ==========================================
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ==========================================
# 构建设置
# ==========================================
timezone: Asia/Shanghai
locale: zh-CN
markdown: kramdown
highlighter: rouge

# ==========================================
# 分页（可选）- 已禁用，首页显示所有文章
# ==========================================
# paginate: 5
# paginate_path: "/page:num/"

# ==========================================
# 默认设置
# ==========================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: noskystar
  - scope:
      path: ""
      type: pages
    values:
      layout: page
