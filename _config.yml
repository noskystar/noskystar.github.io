# 把 theme: minima 改成
remote_theme: cotes2020/jekyll-theme-chirpy

# 加上这些配置
theme_mode: dark          # 默认暗黑模式
lang: zh-CN
timezone: Asia/Shanghai

# 个人资料
author:
  name: noskystar
  bio: "在代码宇宙里寻找属于自己的光 ✨"
  location: "地球某处"
  avatar: ""             # 可以放个星星图片链接
  links:
    - label: GitHub
      icon: fab fa-github
      url: https://github.com/noskystar

# 插件（必须加）
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives

# 分页设置
paginate: 10
paginate_path: /page:num/

# 社交（可选）
github_username: noskystar
